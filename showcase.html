<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #FFC60B;
  --gold-d: #9A7200;
  --gold-m: #FFF3C4;
  --text: #0A0A0A;
  --text2: #5A5A5A;
  --text3: #9A9A9A;
  --bg: #FAFAF8;
  --bg2: #F2F2F0;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --nav-h: 59px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── ETHEREAL BLOB BACKGROUND ── */
.blobs {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
}
.blob-1 {
  width: 750px; height: 750px;
  top: -250px; left: -150px;
  background: radial-gradient(circle, rgba(240,214,255,0.9) 0%, rgba(220,185,255,0.5) 40%, transparent 70%);
  animation: b1 20s ease-in-out infinite;
}
.blob-2 {
  width: 650px; height: 650px;
  top: -100px; right: -100px;
  background: radial-gradient(circle, rgba(190,230,255,0.85) 0%, rgba(160,215,255,0.45) 40%, transparent 70%);
  animation: b2 25s ease-in-out infinite;
}
.blob-3 {
  width: 560px; height: 560px;
  top: 38%; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(circle, rgba(255,245,180,0.75) 0%, rgba(255,230,130,0.4) 40%, transparent 70%);
  animation: b3 30s ease-in-out infinite;
}
.blob-4 {
  width: 480px; height: 480px;
  bottom: 8%; right: -60px;
  background: radial-gradient(circle, rgba(180,245,210,0.8) 0%, rgba(140,230,180,0.4) 40%, transparent 70%);
  animation: b4 22s ease-in-out infinite;
}
.blob-5 {
  width: 380px; height: 380px;
  bottom: 18%; left: 2%;
  background: radial-gradient(circle, rgba(255,210,205,0.75) 0%, rgba(255,185,180,0.4) 40%, transparent 70%);
  animation: b5 27s ease-in-out infinite;
}
@keyframes b1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(50px,35px)} 66%{transform:translate(-25px,55px)} }
@keyframes b2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-45px,25px)} 66%{transform:translate(18px,-38px)} }
@keyframes b3 { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-55px)} }
@keyframes b4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-38px,-45px)} }
@keyframes b5 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(45px,-28px)} }

nav, .page-header, .sotd, .gallery-section, footer { position: relative; z-index: 1; }

/* ── NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 48px; height: var(--nav-h);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,250,248,0.80);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.nav-r { display: flex; align-items: center; gap: 4px; }
.nav-link {
  font-size: 13px; font-weight: 500; color: var(--text2);
  text-decoration: none; padding: 6px 14px; border-radius: 100px; transition: color .15s;
}
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--text); font-weight: 600; }
.nav-signin { margin-right: 4px; }
.nav-cta {
  padding: 8px 20px; border-radius: 100px;
  background: var(--text); color: #fff;
  font-size: 13px; font-weight: 600; border: none; cursor: pointer;
  transition: all .15s; text-decoration: none; margin-left: 6px;
}
.nav-cta:hover { background: #222; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

/* ── PAGE HEADER ── */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 48px; border-bottom: 1px solid var(--border); gap: 16px;
}
.page-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text3);
}
.page-header-center {
  font-size: 12px; color: var(--text3); letter-spacing: 0.04em;
  font-family: 'Geist Mono', monospace;
}
.page-header-right { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); }
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: #22C55E;
  animation: blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── SOTD ── */
.sotd {
  display: grid; grid-template-columns: 1fr 1fr;
  border-bottom: 1px solid var(--border); min-height: 520px;
}
.sotd-meta {
  padding: 56px 52px; display: flex; flex-direction: column; gap: 20px;
  border-right: 1px solid var(--border);
}
.sotd-label {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--gold-d);
  background: var(--gold-m); border: 1px solid #E8D87A;
  border-radius: 100px; padding: 5px 14px; align-self: flex-start;
}
.sotd-date {
  font-size: 11px; color: var(--text3);
  font-family: 'Geist Mono', monospace; letter-spacing: 0.06em; margin-top: -10px;
}
.sotd-domain {
  font-family: 'Geist Mono', monospace;
  font-size: clamp(28px, 3.8vw, 52px);
  font-weight: 500; letter-spacing: -0.02em; line-height: 1.05; color: var(--text);
}
.sotd-name { font-size: 13px; color: var(--text3); margin-top: 2px; }
.sotd-desc { font-size: 15px; line-height: 1.7; color: var(--text2); max-width: 400px; }
.sotd-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  padding: 4px 12px; border-radius: 100px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.7);
  font-size: 11px; color: var(--text2);
}
.sotd-actions { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.btn-dark {
  padding: 11px 24px; background: var(--text); color: #fff;
  font-size: 13px; font-weight: 600; border: none; border-radius: 100px;
  cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s; white-space: nowrap;
}
.btn-dark:hover { background: #222; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
.btn-ghost {
  padding: 11px 24px; background: rgba(255,255,255,0.7); color: var(--text2);
  font-size: 13px; font-weight: 500; border: 1px solid var(--border);
  border-radius: 100px; cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s; white-space: nowrap; backdrop-filter: blur(8px);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border2); background: rgba(255,255,255,0.92); }
.sotd-img-wrap {
  position: relative; overflow: hidden; background: var(--bg2);
}
.sotd-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform .8s ease;
}
.sotd-img-wrap:hover img { transform: scale(1.03); }
.sotd-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Geist Mono', monospace; font-size: 80px; font-weight: 300;
  color: #C8C8C4; background: linear-gradient(135deg, #F0F0EE, #E8E8E4);
}
.sotd-score {
  position: absolute; bottom: 20px; right: 20px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,0.07); border-radius: 10px;
  padding: 8px 16px; font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.score-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

/* ── GALLERY ── */
.gallery-section { padding: 44px 48px 100px; }
.gallery-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
}
.gallery-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text3);
}
.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-pill {
  padding: 5px 14px; border-radius: 100px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.65); font-size: 12px; font-weight: 500;
  color: var(--text2); cursor: pointer; transition: all .15s;
  font-family: 'Geist', sans-serif; backdrop-filter: blur(8px);
}
.filter-pill:hover { color: var(--text); border-color: var(--border2); background: rgba(255,255,255,0.92); }
.filter-pill.active { background: var(--text); color: #fff; border-color: var(--text); }

/* ── GRID ── */
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.card {
  background: rgba(255,255,255,0.72); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(0,0,0,0.06);
  border-radius: 16px; overflow: hidden;
  display: flex; flex-direction: column;
  transition: all .22s ease; color: inherit;
  animation: fadeUp .45s ease forwards; opacity: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 48px rgba(0,0,0,0.09);
  border-color: rgba(0,0,0,0.1);
  background: rgba(255,255,255,0.92);
}
.card-img {
  aspect-ratio: 16/9; overflow: hidden; background: var(--bg2);
  position: relative; cursor: pointer;
}
.card-img img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform .5s ease;
}
.card:hover .card-img img { transform: scale(1.06); }
.card-img-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: 'Geist Mono', monospace; font-size: 36px; font-weight: 300;
  color: #C8C8C4; background: linear-gradient(135deg, #F0F0EE, #E8E8E4);
}
.card-body { padding: 16px 18px 0; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-domain { font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
.card-desc {
  font-size: 12px; line-height: 1.6; color: var(--text2); flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
/* ── CARD ACTIONS ── */
.card-actions {
  display: flex; gap: 0;
  border-top: 1px solid rgba(0,0,0,0.06);
  margin-top: 12px;
}
.card-action {
  flex: 1; padding: 11px 6px;
  font-size: 11px; font-weight: 600; color: var(--text2);
  background: none; border: none; cursor: pointer;
  font-family: 'Geist', sans-serif; letter-spacing: 0.02em;
  transition: all .15s; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  border-right: 1px solid rgba(0,0,0,0.06);
}
.card-action:last-child { border-right: none; }
.card-action:hover { color: var(--text); background: rgba(0,0,0,0.03); }
.card-action.primary { color: var(--text); font-weight: 700; }
.card-action.primary:hover { color: #000; background: rgba(0,0,0,0.04); }

/* card score inline */
.card-score-row {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text3); font-family: 'Geist Mono', monospace;
  padding-bottom: 2px;
}
.score-dot-sm { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

/* ── DETAIL MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(10,10,10,0.55);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: rgba(252,252,250,0.97);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 20px;
  width: 100%; max-width: 1060px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px) scale(0.98);
  transition: transform .35s cubic-bezier(.16,1,.3,1);
  box-shadow: 0 40px 100px rgba(0,0,0,0.18);
}
.modal-backdrop.open .modal { transform: translateY(0) scale(1); }

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 28px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  position: sticky; top: 0; background: rgba(252,252,250,0.95);
  backdrop-filter: blur(12px); z-index: 10; border-radius: 20px 20px 0 0;
}
.modal-header-left { display: flex; flex-direction: column; gap: 4px; }
.modal-domain {
  font-family: 'Geist Mono', monospace; font-size: 22px; font-weight: 500;
  letter-spacing: -0.01em; color: var(--text); line-height: 1.2;
}
.modal-meta { display: flex; align-items: center; gap: 8px; }
.modal-name { font-size: 13px; color: var(--text3); }
.modal-close {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid var(--border); background: rgba(255,255,255,0.8);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text2); transition: all .15s;
  flex-shrink: 0;
}
.modal-close:hover { background: rgba(0,0,0,0.06); color: var(--text); }

.modal-hero {
  width: 100%; aspect-ratio: 16/7; overflow: hidden; background: var(--bg2);
  position: relative;
}
.modal-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.modal-hero-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-family: 'Geist Mono', monospace; font-size: 80px; font-weight: 300; color: #C8C8C4;
}
.modal-score-badge {
  position: absolute; bottom: 16px; right: 16px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
  border: 1px solid rgba(0,0,0,0.08); border-radius: 8px;
  padding: 7px 14px; font-family: 'Geist Mono', monospace;
  font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 6px;
}

.modal-body { padding: 28px; display: flex; flex-direction: column; gap: 24px; }

.modal-desc-section { display: flex; flex-direction: column; gap: 12px; }
.modal-desc { font-size: 15px; line-height: 1.75; color: var(--text2); }
.modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }

/* Key Pages */
.modal-pages-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
}
.modal-pages-scroll {
  display: flex; gap: 12px;
  overflow-x: auto; padding-bottom: 6px;
  scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.12) transparent;
}
.modal-pages-scroll::-webkit-scrollbar { height: 4px; }
.modal-pages-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
.modal-page-thumb {
  flex-shrink: 0; width: 260px; border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(0,0,0,0.07); background: var(--bg2);
  transition: transform .2s; cursor: pointer;
}
.modal-page-thumb:hover { transform: scale(1.02); }
.modal-page-img { aspect-ratio: 16/9; overflow: hidden; background: var(--bg2); }
.modal-page-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.modal-page-img-ph {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: #C8C8C4;
  background: linear-gradient(135deg, #F0F0EE, #E8E8E4);
}
.modal-page-label {
  padding: 8px 10px; font-size: 11px; color: var(--text3);
  font-family: 'Geist Mono', monospace;
}

/* Modal footer actions */
.modal-footer {
  display: flex; gap: 10px; padding: 0 28px 28px; flex-wrap: wrap;
}
.btn-modal-primary {
  padding: 12px 26px; background: var(--text); color: #fff;
  font-size: 13px; font-weight: 600; border: none; border-radius: 100px;
  cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.btn-modal-primary:hover { background: #222; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.14); }
.btn-modal-ghost {
  padding: 12px 26px; background: transparent; color: var(--text2);
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border2); border-radius: 100px;
  cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s;
}
.btn-modal-ghost:hover { color: var(--text); border-color: rgba(0,0,0,0.22); }

/* ── CAT PILL ── */
.cat-pill {
  display: inline-block; padding: 3px 10px; border-radius: 100px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; white-space: nowrap;
}

/* ── FOOTER ── */
footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 48px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text3); gap: 16px; flex-wrap: wrap;

  'E-commerce':    { bg:'rgba(249,115,22,0.1)',  text:'#EA580C' },
  'Fintech':       { bg:'rgba(139,92,246,0.1)',  text:'#7C3AED' },
  'Productivity':  { bg:'rgba(20,184,166,0.1)',  text:'#0D9488' },
};
const defaultColor = { bg:'rgba(0,0,0,0.05)', text:'#777' };

function catStyle(cat) {
  const c = CAT_COLORS[cat] || defaultColor;
  return `background:${c.bg};color:${c.text};`;
}
function screenshotUrl(url) {
  return `https://image.thum.io/get/width/1200/crop/675/noanimate/${url}`;
}
function analyzeUrl(url) {
  return `tool.html?url=${encodeURIComponent(url)}`;
}
function formatDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url; }
}
function getSiteOfDay() {
  // Rotate daily through all loaded sites
  return allSites[Math.floor(Date.now()/86400000) % allSites.length];
}
function formatDate() {
  return new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}
function pageLabel(url) {
  try {
    const u = new URL(url);
    const p = u.pathname.replace(/\/$/, '') || '/';
    return p === '/' ? 'Home' : p.split('/').filter(Boolean).join(' / ');
  } catch(e) { return url; }
}

// ── HERO ─────────────────────────────────────────────────────────
function renderHero(site) {
  const domain = formatDomain(site.url);
  document.getElementById('sotd-meta').innerHTML = `
    <span class="sotd-label">◆ Site of the Day</span>
    <div class="sotd-date">${formatDate()}</div>
    <div>
      <div class="sotd-domain">${domain}</div>
      <div class="sotd-name">${site.name}</div>
    </div>
    <p class="sotd-desc">${site.description}</p>
    <div class="sotd-tags">${site.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="sotd-actions">
      <a href="${analyzeUrl(site.url)}" class="btn-dark">Analyze Design ↗</a>
      <button class="btn-ghost" onclick="openModal(${site.id})">See More</button>
      <a href="${site.url}" target="_blank" rel="noopener" class="btn-ghost">Visit Site ↗</a>
    </div>
  `;
  const imgWrap = document.getElementById('sotd-img');
  imgWrap.innerHTML = `<div class="sotd-img-placeholder">${domain[0].toUpperCase()}</div><div class="sotd-score"><span class="score-dot"></span>Design Score: ${site.score}/100</div>`;
  const img = new Image();
  img.src = screenshotUrl(site.url);
  img.onload = () => {
    imgWrap.innerHTML = `<img src="${img.src}" alt="${site.name}" style="cursor:pointer" onclick="openModal(${site.id})"><div class="sotd-score"><span class="score-dot"></span>Design Score: ${site.score}/100</div>`;
  };
}

// ── GALLERY ───────────────────────────────────────────────────────

function renderCard(site, delay = 0) {
  const domain = formatDomain(site.url);
  return `
    <div class="card" style="animation-delay:${delay}ms">
      <div class="card-img" onclick="openModal(${site.id})">
        <img src="${screenshotUrl(site.url)}" alt="${site.name}" loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-img-placeholder" style="display:none">${domain[0].toUpperCase()}</div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-domain">${domain}</div>
          <span class="cat-pill" style="${catStyle(site.category)}">${site.category}</span>
        </div>
        <p class="card-desc">${site.description}</p>
        <div class="card-score-row"><span class="score-dot-sm"></span>${site.score}/100</div>
      </div>
      <div class="card-actions">
        <a class="card-action primary" href="${analyzeUrl(site.url)}">Analyze ↗</a>
        <button class="card-action" onclick="openModal(${site.id})">See More</button>
        <a class="card-action" href="${site.url}" target="_blank" rel="noopener">Visit ↗</a>
      </div>
    </div>
  `;
}

function renderGallery(filter='all') {
  const sotd = getSiteOfDay();
  const filtered = allSites.filter(s => (filter==='all' || s.category===filter) && s.id!==sotd.id);
  document.getElementById('gallery-grid').innerHTML = filtered.map((s,i) => renderCard(s, i*40)).join('');
  document.getElementById('site-count').textContent = `${allSites.length} sites`;
}

// ── FILTERS ───────────────────────────────────────────────────────
document.getElementById('filter-bar').addEventListener('click', e => {
  const pill = e.target.closest('.filter-pill');
  if (!pill) return;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeFilter = pill.dataset.cat;
  renderGallery(activeFilter);
});

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(siteId) {
  const site = allSites.find(s => s.id === siteId);
  if (!site) return;
  const domain = formatDomain(site.url);
  const pages = site.pages || [site.url];

  // header
  document.getElementById('modal-domain').textContent = domain;
  document.getElementById('modal-name').textContent = site.name;
  document.getElementById('modal-cat-pill').innerHTML = `<span class="cat-pill" style="${catStyle(site.category)}">${site.category}</span>`;

  // hero
  const hero = document.getElementById('modal-hero');
  hero.innerHTML = `<div class="modal-hero-placeholder">${domain[0].toUpperCase()}</div><div class="modal-score-badge"><span class="score-dot"></span>Design Score: ${site.score}/100</div>`;
  const heroImg = new Image();
  heroImg.src = screenshotUrl(site.url);
  heroImg.onload = () => {
    hero.innerHTML = `<img src="${heroImg.src}" alt="${site.name}"><div class="modal-score-badge"><span class="score-dot"></span>Design Score: ${site.score}/100</div>`;
  };

  // body
  document.getElementById('modal-desc').textContent = site.description;
  document.getElementById('modal-tags').innerHTML = site.tags.map(t=>`<span class="tag">${t}</span>`).join('');

  // key pages
  const pagesEl = document.getElementById('modal-pages');
  pagesEl.innerHTML = pages.map(p => {
    const label = pageLabel(p === '/' ? site.url : p);
    const fullUrl = p === '/' ? site.url : p;
    return `
      <a class="modal-page-thumb" href="${fullUrl}" target="_blank" rel="noopener">
        <div class="modal-page-img">
          <img src="${screenshotUrl(fullUrl)}" alt="${label}" loading="lazy"
            onerror="this.style.display='none';this.parentNode.querySelector('.modal-page-img-ph').style.display='flex'">
          <div class="modal-page-img-ph" style="display:none">↗</div>
        </div>
        <div class="modal-page-label">/${label === 'Home' ? '' : label}</div>
      </a>
    `;
  }).join('');

  // footer actions
  document.getElementById('modal-footer').innerHTML = `
    <a class="btn-modal-primary" href="${analyzeUrl(site.url)}">Analyze in Glassdeck ↗</a>
    <a class="btn-modal-ghost" href="${site.url}" target="_blank" rel="noopener">Visit Site ↗</a>
  `;

  // open
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-backdrop').classList.add('open');
}

function closeModal() {
  document.body.style.overflow = '';
  document.getElementById('modal-backdrop').classList.remove('open');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  // Try to load sites.json (works on GitHub Pages / any web server)
  // Falls back to inline SEED_DATA when opened as a local file
  if (location.protocol !== 'file:') {
    try {
      const res = await fetch('sites.json');
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          allSites = data;
        }
      }
    } catch(e) { /* silent — fall through to seed data */ }
  }

  // Always fall back to seed data if fetch failed or was skipped
  if (allSites.length === 0) allSites = SEED_DATA;

  renderHero(getSiteOfDay());
  renderGallery();
}

init();
</script>
</body>
