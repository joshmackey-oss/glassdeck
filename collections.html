<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassdeck — Collections</title>
<meta name="description" content="Your saved design analyses, organized into collections and mood boards." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #FFFFFF;
    --bg2:      #F7F7F8;
    --bg3:      #F0F0F2;
    --border:   #E8E8EC;
    --border2:  #D4D4DA;
    --text:     #0F0F11;
    --text2:    #6B6B78;
    --text3:    #A0A0AD;
    --accent:   #FFC60B;
    --accent2:  #E6B000;
    --accent-l: #FFFBEA;
    --sh-sm:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --sh-md:    0 4px 12px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
    --sh-lg:    0 8px 28px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.04);
  }

  html, body {
    background: #fafafa;
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── AURORA ── */
  .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .aurora-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.45; }
  .aurora-blob-1 {
    width: 700px; height: 600px;
    background: radial-gradient(circle, rgba(255,198,11,0.28) 0%, rgba(255,220,80,0.10) 60%, transparent 80%);
    top: -100px; left: 50%; transform: translateX(-50%);
    animation: blob1 3s ease-in-out infinite alternate;
  }
  .aurora-blob-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(180,210,255,0.45) 0%, transparent 70%);
    top: -80px; right: -100px;
    animation: blob2 4s ease-in-out infinite alternate;
  }
  @keyframes blob1 { 0% { transform: translateX(-50%) translate(-60px,0); } 100% { transform: translateX(-50%) translate(60px,60px); } }
  @keyframes blob2 { 0% { transform: translate(0,0); } 100% { transform: translate(-80px,80px); } }

  /* ── NAV ── */
  .nav-wrap {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; justify-content: center;
    padding: 12px 24px; pointer-events: none;
  }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    height: 52px; padding: 0 8px 0 18px;
    width: 100%; max-width: 1200px;
    border-radius: 100px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px) saturate(180%) brightness(1.04);
    -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.04);
    border: 1px solid rgba(255,255,255,0.55);
    box-shadow: 0 2px 20px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
    pointer-events: all;
  }
  .logo { display: flex; align-items: center; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 2px; }
  .nav-link {
    padding: 6px 13px; font-size: 13.5px; font-weight: 500;
    color: #3a3a3a; text-decoration: none; border-radius: 100px;
    transition: color .15s, background .15s; white-space: nowrap;
  }
  .nav-link:hover { color: #0a0a0a; background: rgba(0,0,0,0.07); }
  .nav-link.active { color: #0a0a0a; background: rgba(0,0,0,0.06); }
  .nav-cta {
    padding: 8px 20px; background: #0A0A0A; color: #fff;
    font-size: 13.5px; font-weight: 600; border-radius: 100px;
    text-decoration: none; transition: all .2s;
  }
  .nav-cta:hover { background: #222; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }
  .nav-spacer { height: 76px; }

  /* ── LAYOUT ── */
  .page-layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 60px;
    gap: 28px;
    position: relative; z-index: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    position: sticky;
    top: 88px;
    height: fit-content;
    max-height: calc(100vh - 120px);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 0 10px;
    margin-bottom: 4px;
    margin-top: 8px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text2);
    user-select: none;
    position: relative;
  }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active { background: var(--bg3); color: var(--text); }
  .sidebar-item .s-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
  .sidebar-item .s-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-item .s-count {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    background: var(--bg3);
    padding: 1px 6px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .sidebar-item.active .s-count {
    background: rgba(0,0,0,0.08);
  }

  .sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; }

  .sidebar-new-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 10px;
    border: 1.5px dashed var(--border2);
    background: none; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text3);
    transition: all .15s; width: 100%;
    font-family: 'Geist', sans-serif;
  }
  .sidebar-new-btn:hover { border-color: var(--accent); color: var(--text); background: var(--accent-l); }
  .sidebar-new-btn .plus { font-size: 16px; line-height: 1; }

  /* ── MAIN CONTENT ── */
  .main-content { flex: 1; min-width: 0; }

  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 16px;
  }

  .main-title-wrap { display: flex; flex-direction: column; gap: 3px; }
  .main-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .main-subtitle {
    font-size: 13px;
    color: var(--text3);
    font-family: 'Geist Mono', monospace;
  }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  .sort-select {
    padding: 7px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: var(--bg);
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    outline: none;
  }
  .sort-select:focus { border-color: var(--border2); }

  .new-col-btn {
    padding: 8px 16px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .new-col-btn:hover { background: #333; transform: translateY(-1px); }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* ── ANALYSIS CARD ── */
  .analysis-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--sh-sm);
    transition: box-shadow .2s, transform .2s;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .analysis-card:hover {
    box-shadow: var(--sh-lg);
    transform: translateY(-2px);
  }

  /* Color strip */
  .card-colors {
    display: flex;
    height: 44px;
    flex-shrink: 0;
  }
  .card-color-swatch { flex: 1; }

  /* Card body */
  .card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }

  .card-site {
    display: flex; align-items: center; gap: 9px;
  }
  .card-emoji { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .card-site-info { min-width: 0; }
  .card-name {
    font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-url {
    font-size: 11px; color: var(--text3);
    font-family: 'Geist Mono', monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .card-archetype {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    background: var(--accent-l);
    border: 1px solid rgba(255,198,11,0.3);
    border-radius: 20px;
    font-size: 11.5px;
    font-weight: 600;
    color: #7a5c00;
    width: fit-content;
  }

  .card-meta {
    display: flex;
    gap: 16px;
  }
  .card-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .card-meta-label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); }
  .card-meta-val { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }

  .card-fonts {
    display: flex; flex-direction: column; gap: 3px;
  }
  .card-font-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--text2);
  }
  .card-font-role {
    font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text3);
    background: var(--bg3); padding: 2px 5px; border-radius: 4px;
    flex-shrink: 0;
  }
  .card-font-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .card-saved-date { font-size: 11px; color: var(--text3); font-family: 'Geist Mono', monospace; }

  .card-actions { display: flex; gap: 6px; }
  .card-action-btn {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: none; cursor: pointer;
    font-size: 13px; color: var(--text3);
    transition: all .15s;
  }
  .card-action-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .card-action-btn.danger:hover { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 40px; text-align: center; gap: 16px;
  }
  .empty-icon { font-size: 48px; line-height: 1; opacity: 0.4; }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .empty-desc { font-size: 14px; color: var(--text3); max-width: 300px; line-height: 1.6; }
  .empty-cta {
    margin-top: 8px;
    padding: 10px 20px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    display: inline-block;
  }
  .empty-cta:hover { background: #333; transform: translateY(-1px); }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--sh-lg);
    animation: modal-in .2s ease;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-size: 17px; font-weight: 600; letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .modal-input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border2);
    border-radius: 10px;
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s;
    margin-bottom: 16px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--text3); }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel {
    padding: 9px 18px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 9px;
    font-family: 'Geist', sans-serif;
    font-size: 13.5px; font-weight: 500;
    color: var(--text2); cursor: pointer;
    transition: all .15s;
  }
  .modal-cancel:hover { background: var(--bg3); color: var(--text); }
  .modal-confirm {
    padding: 9px 18px;
    background: var(--text);
    border: none;
    border-radius: 9px;
    font-family: 'Geist', sans-serif;
    font-size: 13.5px; font-weight: 600;
    color: #fff; cursor: pointer;
    transition: all .15s;
  }
  .modal-confirm:hover { background: #333; }

  /* Rename / collection actions */
  .collection-edit-row {
    display: flex; align-items: center; gap: 6px;
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    opacity: 0; transition: opacity .15s;
  }
  .sidebar-item:hover .collection-edit-row { opacity: 1; }
  .col-edit-btn {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: var(--bg3); border-radius: 5px;
    font-size: 11px; cursor: pointer; color: var(--text3);
    transition: all .15s;
  }
  .col-edit-btn:hover { background: var(--border2); color: var(--text); }
  .col-edit-btn.del:hover { background: #FEF2F2; color: #DC2626; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .page-layout { flex-direction: column; padding: 0 16px 40px; gap: 20px; }
    .sidebar { width: 100%; position: static; flex-direction: row; flex-wrap: wrap; gap: 6px; }
    .sidebar-label { display: none; }
    .sidebar-divider { display: none; }
    .sidebar-new-btn { width: auto; }
    .cards-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob aurora-blob-1"></div>
  <div class="aurora-blob aurora-blob-2"></div>
</div>

<!-- PAGE LAYOUT -->
<div class="page-layout">

    <div class="sidebar-item active" data-col="all" onclick="selectCollection('all', this)">
      <span class="s-icon">🗂</span>
      <span class="s-name">All saved</span>
      <span class="s-count" id="count-all">0</span>
    </div>

    <div class="sidebar-divider"></div>

    <div id="collection-list">
      <!-- Dynamic collection items rendered here -->
    </div>

    <button class="sidebar-new-btn" onclick="openNewCollectionModal()">
      <span class="plus">+</span> New collection
    </button>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="main-header">
      <div class="main-title-wrap">
        <div class="main-title" id="view-title">All saved</div>
        <div class="main-subtitle" id="view-subtitle">0 analyses</div>
      </div>
      <div class="header-actions">
        <select class="sort-select" id="sort-select" onchange="renderCards()">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
    </div>

    <div class="cards-grid" id="cards-grid">
      <!-- Cards rendered here -->
    </div>

    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-icon">📋</div>
      <div class="empty-title">Nothing saved yet</div>
      <div class="empty-desc">Analyze a site in the tool and hit "Save to collection" to start building your library.</div>
      <a href="tool.html" class="empty-cta">Open the tool →</a>
    </div>
  </main>
</div>

<!-- NEW COLLECTION MODAL -->
<div class="modal-backdrop" id="new-col-modal">
  <div class="modal">
    <div class="modal-title">New collection</div>
    <input class="modal-input" id="new-col-input" type="text" placeholder="e.g. Q4 Rebrand Inspo" maxlength="60" />
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeNewCollectionModal()">Cancel</button>
      <button class="modal-confirm" onclick="createCollection()">Create</button>
    </div>
  </div>
</div>

<!-- RENAME COLLECTION MODAL -->
<div class="modal-backdrop" id="rename-col-modal">
  <div class="modal">
    <div class="modal-title">Rename collection</div>
    <input class="modal-input" id="rename-col-input" type="text" maxlength="60" />
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeRenameModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmRename()">Save</button>
    </div>
  </div>
</div>

<script>
// ── STORAGE HELPERS ──────────────────────────────────────────────────
const GD_ANALYSES    = 'gd_analyses';
const GD_COLLECTIONS = 'gd_collections';

function getAnalyses()    { try { return JSON.parse(localStorage.getItem(GD_ANALYSES) || '[]'); } catch { return []; } }
function getCollections() { try { return JSON.parse(localStorage.getItem(GD_COLLECTIONS) || '[]'); } catch { return []; } }
function saveAnalyses(a)  { localStorage.setItem(GD_ANALYSES, JSON.stringify(a)); }
function saveCollections(c){ localStorage.setItem(GD_COLLECTIONS, JSON.stringify(c)); }

function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

// ── STATE ────────────────────────────────────────────────────────────
let activeCollectionId = 'all';
let renameTargetId = null;

// ── SIDEBAR ──────────────────────────────────────────────────────────
function renderSidebar() {
  const analyses    = getAnalyses();
  const collections = getCollections();

  document.getElementById('count-all').textContent = analyses.length;

  const list = document.getElementById('collection-list');
  list.innerHTML = collections.map(col => {
    const count = analyses.filter(a => a.collectionIds?.includes(col.id)).length;
    const isActive = activeCollectionId === col.id;
    return `
      <div class="sidebar-item ${isActive ? 'active' : ''}" data-col="${col.id}" onclick="selectCollection('${col.id}', this)">
        <span class="s-icon">📁</span>
        <span class="s-name">${escHtml(col.name)}</span>
        <span class="s-count">${count}</span>
        <div class="collection-edit-row">
          <button class="col-edit-btn" onclick="event.stopPropagation();openRenameModal('${col.id}')" title="Rename">✏️</button>
          <button class="col-edit-btn del" onclick="event.stopPropagation();deleteCollection('${col.id}')" title="Delete">🗑</button>
        </div>
      </div>`;
  }).join('');
}

function selectCollection(id, el) {
  activeCollectionId = id;
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  renderCards();
}

// ── CARDS ────────────────────────────────────────────────────────────
function getVisibleAnalyses() {
  const analyses = getAnalyses();
  if (activeCollectionId === 'all') return analyses;
  return analyses.filter(a => a.collectionIds?.includes(activeCollectionId));
}

function sortedAnalyses(list) {
  const sort = document.getElementById('sort-select').value;
  const copy = [...list];
  if (sort === 'newest') copy.sort((a,b) => b.savedAt - a.savedAt);
  else if (sort === 'oldest') copy.sort((a,b) => a.savedAt - b.savedAt);
  else if (sort === 'name') copy.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  return copy;
}

function renderCards() {
  const visible = sortedAnalyses(getVisibleAnalyses());
  const collections = getCollections();
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');

  // Update header
  const colName = activeCollectionId === 'all' ? 'All saved' :
    (collections.find(c => c.id === activeCollectionId)?.name || 'Collection');
  document.getElementById('view-title').textContent = colName;
  document.getElementById('view-subtitle').textContent = `${visible.length} ${visible.length === 1 ? 'analysis' : 'analyses'}`;

  if (visible.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = visible.map(a => cardHTML(a)).join('');
}

function cardHTML(a) {
  const colors = (a.colors || []).slice(0, 6);
  const colorStrip = colors.length
    ? colors.map(c => `<div class="card-color-swatch" style="background:${escHtml(c.hex || c)}"></div>`).join('')
    : `<div class="card-color-swatch" style="background:#e8e8ec"></div>`;

  const fonts = (a.fonts || []).slice(0, 2);
  const fontRows = fonts.map(f =>
    `<div class="card-font-item">
      <span class="card-font-role">${escHtml(f.role || 'body')}</span>
      <span class="card-font-name">${escHtml(f.name || '')}</span>
    </div>`).join('');

  const date = a.savedAt ? new Date(a.savedAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '';

  return `
    <div class="analysis-card" onclick="openAnalysis('${escHtml(a.url)}')">
      <div class="card-colors">${colorStrip}</div>
      <div class="card-body">
        <div class="card-site">
          <span class="card-emoji">${escHtml(a.emoji || '🌐')}</span>
          <div class="card-site-info">
            <div class="card-name">${escHtml(a.name || a.url)}</div>
            <div class="card-url">${escHtml(a.url || '')}</div>
          </div>
        </div>

        ${a.archetype ? `<div class="card-archetype">${escHtml(a.archetype.label)}</div>` : ''}

        <div class="card-meta">
          ${a.consistency ? `<div class="card-meta-item"><div class="card-meta-label">Consistency</div><div class="card-meta-val">${a.consistency.pct}%</div></div>` : ''}
          ${a.maturity ? `<div class="card-meta-item"><div class="card-meta-label">Maturity</div><div class="card-meta-val">${escHtml(a.maturity.label)}</div></div>` : ''}
        </div>

        ${fontRows ? `<div class="card-fonts">${fontRows}</div>` : ''}

        <div class="card-footer">
          <span class="card-saved-date">${date}</span>
          <div class="card-actions">
            <button class="card-action-btn" onclick="event.stopPropagation();openAnalysis('${escHtml(a.url)}')" title="Re-analyze">↗</button>
            <button class="card-action-btn danger" onclick="event.stopPropagation();removeAnalysis('${a.id}')" title="Remove">×</button>
          </div>
        </div>
      </div>
    </div>`;
}

function openAnalysis(url) {
  window.location.href = `tool.html?url=${encodeURIComponent(url)}`;
}

function removeAnalysis(id) {
  if (!confirm('Remove this analysis from your saved items?')) return;
  let analyses = getAnalyses();
  analyses = analyses.filter(a => a.id !== id);
  saveAnalyses(analyses);
  renderSidebar();
  renderCards();
}

// ── COLLECTIONS CRUD ─────────────────────────────────────────────────
function openNewCollectionModal() {
  document.getElementById('new-col-input').value = '';
  document.getElementById('new-col-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-col-input').focus(), 50);
}
function closeNewCollectionModal() {
  document.getElementById('new-col-modal').classList.remove('open');
}
function createCollection() {
  const name = document.getElementById('new-col-input').value.trim();
  if (!name) return;
  const collections = getCollections();
  collections.push({ id: uid(), name, createdAt: Date.now() });
  saveCollections(collections);
  closeNewCollectionModal();
  renderSidebar();
}

function openRenameModal(id) {
  const col = getCollections().find(c => c.id === id);
  if (!col) return;
  renameTargetId = id;
  document.getElementById('rename-col-input').value = col.name;
  document.getElementById('rename-col-modal').classList.add('open');
  setTimeout(() => document.getElementById('rename-col-input').focus(), 50);
}
function closeRenameModal() {
  document.getElementById('rename-col-modal').classList.remove('open');
  renameTargetId = null;
}
function confirmRename() {
  const name = document.getElementById('rename-col-input').value.trim();
  if (!name || !renameTargetId) return;
  const cols = getCollections().map(c => c.id === renameTargetId ? {...c, name} : c);
  saveCollections(cols);
  closeRenameModal();
  renderSidebar();
  renderCards();
}

function deleteCollection(id) {
  if (!confirm('Delete this collection? Saved analyses won\'t be deleted.')) return;
  const cols = getCollections().filter(c => c.id !== id);
  saveCollections(cols);
  if (activeCollectionId === id) activeCollectionId = 'all';
  renderSidebar();
  renderCards();
}

// ── UTILS ────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── KEYBOARD ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeNewCollectionModal();
    closeRenameModal();
  }
  if (e.key === 'Enter') {
    if (document.getElementById('new-col-modal').classList.contains('open')) createCollection();
    if (document.getElementById('rename-col-modal').classList.contains('open')) confirmRename();
  }
});

document.getElementById('new-col-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeNewCollectionModal();
});
document.getElementById('rename-col-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeRenameModal();
});
